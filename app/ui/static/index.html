<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangGraph MCP Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  header h1 { font-size: 1.75rem; font-weight: 700; color: #f7fafc; }
  header p  { color: #718096; margin-top: 0.4rem; font-size: 0.9rem; }

  .chat-box {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
  }

  textarea {
    flex: 1;
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    resize: vertical;
    min-height: 3.5rem;
    line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: #4a9eff; }
  textarea::placeholder { color: #4a5568; }

  button {
    align-self: flex-end;
    background: #4a9eff;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 0.6rem 1.4rem;
    transition: background 0.15s;
    white-space: nowrap;
  }
  button:hover  { background: #3182ce; }
  button:active { background: #2b6cb0; }
  button:disabled { background: #2d3748; color: #718096; cursor: default; }

  #status {
    display: none;
    align-items: center;
    gap: 0.5rem;
    color: #718096;
    font-size: 0.9rem;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #2d3748;
    border-top-color: #4a9eff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #results { display: none; flex-direction: column; gap: 1rem; }

  .card {
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    background: #171c27;
    border-bottom: 1px solid #2d3748;
    color: #a0aec0;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.5rem 1rem;
    text-transform: uppercase;
  }
  .card-body {
    padding: 0.85rem 1rem;
    font-size: 0.9rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-body.mono {
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 0.82rem;
    color: #a8d8a8;
  }

  .badge {
    display: inline-block;
    background: #2d3748;
    border-radius: 4px;
    color: #a0aec0;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
  .badge.mq     { background: #1a365d; color: #90cdf4; }
  .badge.direct { background: #1a202c; color: #68d391; border: 1px solid #276749; }

  .error-banner {
    background: #2d1a1a;
    border: 1px solid #742a2a;
    border-radius: 8px;
    color: #fc8181;
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
  }

  #mode-badge { margin-top: -0.5rem; text-align: right; font-size: 0.8rem; color: #4a5568; }

  .model-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .model-row label {
    color: #a0aec0;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  select#model-select {
    flex: 1;
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.9rem;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
  }
  select#model-select:focus { outline: none; border-color: #4a9eff; }
  select#model-select:disabled { color: #4a5568; cursor: default; }
</style>
</head>
<body>

<header>
  <h1>LangGraph MCP Agent</h1>
  <p>Ask me to list, read, search, or summarise files in the sandbox.</p>
</header>

<div class="chat-box">

  <div class="model-row">
    <label for="model-select">Model</label>
    <select id="model-select" disabled>
      <option value="">Loading models&hellip;</option>
    </select>
  </div>

  <div class="input-row">
    <textarea id="user-input"
      placeholder="e.g. list files, read hello.txt, find *.json, summarise data.json"
      rows="2"
    ></textarea>
    <button id="send-btn" type="button">Send</button>
  </div>

  <div id="status">
    <div class="spinner"></div>
    <span>Thinking&hellip;</span>
  </div>

  <div id="results">
    <p id="mode-badge"></p>

    <div class="card" id="card-input">
      <div class="card-header">Your request</div>
      <div class="card-body" id="result-input"></div>
    </div>

    <div class="card" id="card-tool">
      <div class="card-header">Tool selected</div>
      <div class="card-body" id="result-tool"></div>
    </div>

    <div class="card" id="card-output">
      <div class="card-header">Tool output</div>
      <div class="card-body mono" id="result-output"></div>
    </div>

    <div class="card" id="card-response">
      <div class="card-header">Agent response</div>
      <div class="card-body" id="result-response"></div>
    </div>

    <div id="error-container"></div>
  </div>

</div>

<script>
  const sendBtn    = document.getElementById('send-btn');
  const inputEl    = document.getElementById('user-input');
  const statusEl   = document.getElementById('status');
  const resultsEl  = document.getElementById('results');
  const errEl      = document.getElementById('error-container');
  const modelSelect = document.getElementById('model-select');

  const MODEL_KEY = 'langgraph_selected_model';

  // Populate the model dropdown from /api/models on page load.
  async function loadModels() {
    try {
      const resp = await fetch('/api/models');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      modelSelect.innerHTML = '';
      const saved = localStorage.getItem(MODEL_KEY);

      data.models.forEach((name) => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        // Restore persisted selection, fall back to server-reported default.
        if (name === (saved || data.default)) opt.selected = true;
        modelSelect.appendChild(opt);
      });

      modelSelect.disabled = data.models.length === 0;
      if (data.models.length === 0) {
        const opt = document.createElement('option');
        opt.textContent = 'No models found';
        modelSelect.appendChild(opt);
      }
    } catch (err) {
      modelSelect.innerHTML = '<option value="">Could not load models</option>';
      console.error('Failed to load models:', err);
    }
  }

  // Persist selection to localStorage whenever the user changes it.
  modelSelect.addEventListener('change', () => {
    if (modelSelect.value) localStorage.setItem(MODEL_KEY, modelSelect.value);
  });

  async function send() {
    const userInput = inputEl.value.trim();
    if (!userInput) return;

    // Reset UI
    sendBtn.disabled = true;
    statusEl.style.display = 'flex';
    resultsEl.style.display = 'none';
    errEl.innerHTML = '';

    const selectedModel = modelSelect.value || null;

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_input: userInput, model: selectedModel }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }

      const data = await resp.json();

      document.getElementById('result-input').textContent    = data.user_input || '—';
      document.getElementById('result-tool').textContent     = data.selected_tool || '—';
      document.getElementById('result-output').textContent   =
        data.tool_output != null ? JSON.stringify(data.tool_output, null, 2) : '—';
      document.getElementById('result-response').textContent = data.final_response || '—';

      const modeBadge = document.getElementById('mode-badge');
      modeBadge.innerHTML =
        `Mode: <span class="badge ${data.mode}">${data.mode}</span>` +
        ` &nbsp; Model: <code style="color:#718096;font-size:0.75rem">${escHtml(selectedModel || 'default')}</code>` +
        ` &nbsp; ID: <code style="color:#718096;font-size:0.75rem">${data.request_id}</code>`;

      if (data.error) {
        errEl.innerHTML =
          `<div class="error-banner">Agent error: ${escHtml(data.error)}</div>`;
      }

      resultsEl.style.display = 'flex';
    } catch (err) {
      errEl.innerHTML = `<div class="error-banner">${escHtml(err.message)}</div>`;
      resultsEl.style.display = 'flex';
    } finally {
      statusEl.style.display = 'none';
      sendBtn.disabled = false;
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  loadModels();
</script>
</body>
</html>
